name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container: 
      image: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Buildozer
        env:
          BUILDOZER_ALLOW_ROOT: 1
        run: |
          buildozer android debug
          
