name: Build APK
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    container: kivy/buildozer:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        env:
          BUILDOZER_ALLOW_ROOT: '1'
        run: |
          buildozer android debug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
          
